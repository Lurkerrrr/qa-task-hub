name: Automated Checks

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: qataskdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run security audit
        working-directory: ./backend
        run: npm audit --audit-level=high || true

      - name: Type check
        working-directory: ./backend
        run: npm run typecheck

      - name: Verify Production Build
        working-directory: ./backend
        run: npm run build

      - name: Run test suite with coverage
        working-directory: ./backend
        run: npm run test:coverage
        env:
          JWT_SECRET: ci_super_secret_test_key

      - name: Start Backend Server for QA Tests
        working-directory: ./backend
        run: npm run start &
        env:
          PORT: 5000
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: qataskdb
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          JWT_SECRET: ci_super_secret_test_key

      - name: Wait for server to boot
        run: sleep 5

      - name: Run Postman Auth Tests via Newman
        working-directory: ./backend
        run: npx newman run ../postman/collections/auth.collection.json -e ../postman/environments/local.env.json --export-environment ../postman/environments/ci-env.json -r cli,allure --reporter-allure-export allure-results

      - name: Run Postman Bug Tests via Newman
        working-directory: ./backend
        run: npx newman run ../postman/collections/bug.collection.json -e ../postman/environments/ci-env.json -r cli,allure --reporter-allure-export allure-results    

      - name: Generate Allure Report
        working-directory: ./backend
        if: always()
        run: npx allure generate allure-results --clean -o ../allure-report  

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-report  

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run Code Linter
        working-directory: ./frontend
        run: npm run lint  

      - name: Verify Production Build
        working-directory: ./frontend
        run: npm run build
        env:
          CI: false # Prevents React warnings from being treated as strict errors during build

  release:
    name: Release Automation
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        