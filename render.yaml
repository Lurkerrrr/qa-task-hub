services:
  - type: web
    name: qa-task-manager-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: qa-task-db
          property: connectionString

  - type: psql
    name: qa-task-db
    plan: free
    postgresMajorVersion: 15